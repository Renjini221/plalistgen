<html lang="en">
        <head>
            <title>Playlist Generator</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <style>
body{
    background:#111;
    color:#eee;
    font-family:sans-serif;
}
.wrap{
    max-width:600px;
    margin:auto;
    padding:20px;

}
.head{
    font-size:22px;
    margin-bottom:10px;
}
.sub{
    color:#aaa;
    margin-bottom:20px;
}
.box{
    background:#1a1a1a;
    padding:15px;
}
.input{
    width:100%;
    padding:10px;
    background:#222;
    border:1px solid #333;
    border-radius:6px;
    margin-bottom:10px;
    color:white;
}
.btn{
    width:100%;
    padding:10px;
    background:#16a34a;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.btn:hover{
    background:#15803d;
}
.card{
    display:flex;
    gap:12px;
    background:#1a1a1a;
    padding:12px;
    margin-top:10px;
}
.player{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:8px;
}
.bar{
    flex:1;
    height:5px;
    background:#333;
    border-radius:5px;
    cursor:pointer;
}
.progress{
    height:5px;
    background:#16a34a;
    width:0%;
    border-radius:5px;
}
.player button{
    background:#16a34a;
    border:none;
    color:white;
    padding:5px 10px;
    border-radius:4px;
}
            </style>
            </head>
            <body>
                <div class="wrap">
<div class="head">Playlist Generator</div>
<div class="sub">Type a vibe and get the music</div>
<div class="box">
    <form method="POST">
        <input class="input" name="prompt" required>
        <button class="btn">Generate</button>
    </form>
</div>
{% if songs %}
{% for song in songs%}
<div class ="card">
{% if song.img%}
<img src="{{song.img}}" class="img" style="width:60px;height:60px;object-fit:cover;">
{% endif%}
<div style="flex:1">
    <div class="title">{{song.name}}</div>
    <div class="artist">{{song.artist or "Unknown"}}</div>
{% if song.audio%}

<div class="player"> 
    <button onclick="playSong(this)">▶</button>
    <div class="bar">
        <div class="progress"></div>
    </div>
    <span class="time">0:00</span>
    <audio src="{{ song.audio}}"></audio>
</div>

{% endif%}
</div>

</div>
{%endfor%}
{%else%}
<div class="empty"
>No playlist yet</div>   
{% endif %}
</div>
            </body>
            <script>
            function playSong(btn){
                const player = btn.parentElement;
                const card = player.parentElements;
                const audio = player.querySelector("audio");
                const progress = player.querySelector(".progress");
                
                const time= player.querySelector(".time");

                document.querySelectorAll("audio").forEach(a => {
                    if(a !== audio){
                        a.pause();
                    }
                });
document.querySelectorAll(".player button").forEach(b=>{
    if(b !== btn) b.innerText="▶";
})
                 if (audio.paused){
                    audio.play().then(() => {
                    btn.innerText = "⏸";
                });
                 }else{
                    audio.pause();
                    btn.innerText="▶"
                 }
                 audio.ontimeupdate = () => {
                    let percent = audio.duration ? (audio.currentTime / audio.duration)*100: 0;
                    progress.style.width = percent + "%";

                    let min = Math.floor(audio.currentTime/60);
                    let sec = Math.floor(audio.currentTime % 60);
                    sec = sec < 10 ? "0" + sec : sec;

                    time.innerText = min + ":" + sec;
                 };
                 audio.onended =() => {
                    const nextCard = card.nextElementSibling;

                    if(nextCard){
                        const nextbtn = nextcard.querySelector("button");
                        if(nextBtn){
                            nextBtn.click();
                        }
                    }
                 };
                }
            
            </script>
</html>
