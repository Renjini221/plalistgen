<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Playlist</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#111; color:#eee; font-family:sans-serif; }

.wrap { max-width:600px; margin:auto; padding:20px; }

.head { font-size:22px; margin-bottom:10px; }
.sub { color:#aaa; margin-bottom:20px; }

.box { background:#1a1a1a; padding:15px; border-radius:8px; }

.input {
    width:100%;
    padding:10px;
    background:#222;
    border:1px solid #333;
    border-radius:6px;
    margin-bottom:10px;
    color:white;
}

.btn {
    width:100%;
    padding:10px;
    background:#16a34a;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn:hover { background:#15803d; }

.card {
    display:flex;
    gap:12px;
    background:#1a1a1a;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
}

.img { width:60px; height:60px; border-radius:6px; }

.title { font-size:16px; }
.artist { font-size:13px; color:#aaa; }

.empty { text-align:center; color:#777; margin-top:20px; }
</style>
</head>

<body>

<div class="wrap">

    <div class="head">AI Playlist Generator</div>
    <div class="sub">Type a vibe and get music</div>

    <div class="box">
        <form method="POST">
            <input class="input" name="prompt" required>
            <button class="btn">Generate</button>
        </form>
    </div>

    {% if songs %}
        {% for song in songs %}
        <div class="card">

            {% if song.img %}
            <img src="{{ song.img }}" class="img">
            {% endif %}

            <div style="flex:1">
                <div class="title">{{ song.name }}</div>
                <div class="artist">{{ song.artist or "Unknown" }}</div>

                {% if song.audio %}
                <audio controls style="width:100%; margin-top:6px;">
                    <source src="{{ song.audio }}">
                </audio>
                {% endif %}
            </div>

        </div>
        {% endfor %}

    {% else %}
        <div class="empty">No playlist yet</div>
    {% endif %}

</div>

</body>
</html>
